apiVersion: apps/v1
kind: Deployment
metadata:
  name: eduai-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eduai
  template:
    metadata:
      labels:
        app: eduai
    spec:
      containers:
      - name: eduai-container
        image: siyakusumakar/eduai-project:v2
        ports:
        - containerPort: 8501
        env:
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: Enter you api key